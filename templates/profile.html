<!DOCTYPE html>
<html>
<head>
  <title>Profile - MyBudgetPlan</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
    body { background-color: #f0f2f5; color: #333; }
    header { background-color: #1a2e4a; color: white; padding: 20px; text-align: center; position: relative; }
    header h1 { font-size: 28px; }
    header a { position: absolute; top: 20px; color: white; text-decoration: none; font-size: 14px; opacity: 0.8; }
    .back-link { left: 20px; }
    .logout-link { right: 20px; }
    .container { max-width: 600px; margin: 30px auto; padding: 0 20px; }
    .card { background: white; border-radius: 12px; padding: 30px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 20px; }
    .card h2 { font-size: 18px; margin-bottom: 15px; color: #1a2e4a; }
    .info-row { padding: 10px 0; border-bottom: 1px solid #eee; }
    .info-label { font-size: 12px; color: #888; margin-bottom: 4px; }
    .info-value { font-size: 15px; color: #333; }
    label { display: block; font-size: 13px; color: #555; margin-bottom: 6px; margin-top: 12px; }
    input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
    button { width: 100%; padding: 12px; background: #1a2e4a; color: white; border: none; border-radius: 6px; font-size: 15px; cursor: pointer; margin-top: 16px; }
    button:hover { background: #243d5f; }
    .danger { background: #e74c3c !important; }
    .danger:hover { background: #c0392b !important; }
    .message { background: #eaffea; color: #27ae60; padding: 10px; border-radius: 6px; margin-bottom: 16px; font-size: 13px; }
    .error { background: #fee; color: #e74c3c; padding: 10px; border-radius: 6px; margin-bottom: 16px; font-size: 13px; }
  </style>
</head>
<body>
  <header>
    <a href="/" class="back-link">← Back</a>
    <h1>Profile</h1>
    <a href="/logout" class="logout-link">Logout</a>
  </header>

  <div class="container">
    {% if message %}<div class="message">{{ message }}</div>{% endif %}
    {% if error %}<div class="error">{{ error }}</div>{% endif %}

    <div class="card">
      <h2>Account Information</h2>
      <div class="info-row">
        <div class="info-label">Email</div>
        <div class="info-value">{{ user }}</div>
      </div>
    </div>

    <div class="card">
      <h2>Change Password</h2>
      <form method="POST">
        <input type="hidden" name="action" value="change_password">
        <label>New Password</label>
        <input type="password" name="new_password" placeholder="Enter new password" required minlength="6">
        <button type="submit">Update Password</button>
      </form>
    </div>

    <div class="card">
      <h2>Danger Zone</h2>
      <p style="font-size: 13px; color: #888; margin-bottom: 12px;">Deleting your account will permanently remove all your budget data. This cannot be undone.</p>
      <form method="POST" onsubmit="return confirm('Are you sure you want to delete your account? This cannot be undone.');">
        <input type="hidden" name="action" value="delete_account">
        <button type="submit" class="danger">Delete My Account</button>
      </form>
    </div>
  </div>
</body>
</html>
