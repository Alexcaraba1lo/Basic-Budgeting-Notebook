<!DOCTYPE html>
<html>
<head>
  <title>Login - MyBudgetPlan</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/static/manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MyBudgetPlan">
  <link rel="apple-touch-icon" href="/static/icon-192.png">
  <meta name="theme-color" content="#1a2e4a">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
    body { background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .card { background: white; border-radius: 12px; padding: 40px; width: 100%; max-width: 400px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    h1 { color: #1a2e4a; font-size: 24px; margin-bottom: 8px; text-align: center; }
    p.subtitle { color: #888; font-size: 14px; text-align: center; margin-bottom: 30px; }
    label { display: block; font-size: 13px; color: #555; margin-bottom: 6px; }
    input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; margin-bottom: 16px; }
    button { width: 100%; padding: 12px; background: #1a2e4a; color: white; border: none; border-radius: 6px; font-size: 15px; cursor: pointer; }
    button:hover { background: #243d5f; }
    .error { background: #fee; color: #e74c3c; padding: 10px; border-radius: 6px; margin-bottom: 16px; font-size: 13px; }
    .link { text-align: center; margin-top: 20px; font-size: 13px; color: #888; }
    .link a { color: #1a2e4a; text-decoration: none; font-weight: bold; }
  </style>
</head>
<body>
  <div class="card">
    <h1>MyBudgetPlan</h1>
    <p class="subtitle">Sign in to your account</p>
    {% if error %}
<div class="error">{{ error }}</div>
{% endif %}
{% if message %}
<div style="background: #eaffea; color: #27ae60; padding: 10px; border-radius: 6px; margin-bottom: 16px; font-size: 13px;">{{ message }}</div>
{% endif %}
    <form method="POST">
      <label>Email</label>
      <input type="email" name="email" placeholder="you@email.com" required>
      <label>Password</label>
      <input type="password" name="password" placeholder="Your password" required>
      <label style="display: flex; align-items: center; gap: 8px; margin-bottom: 16px; font-size: 13px; color: #555; cursor: pointer;">
        <input type="checkbox" name="remember" style="width: auto; margin: 0;">
        Remember me on this device
      </label>
      <button type="submit">Sign In</button>
    </form>
    <div class="link">Don't have an account? <a href="/signup">Sign up</a></div>
<div style="text-align: center; margin-top: 12px;">
  <a href="/demo" style="display: inline-block; width: 100%; padding: 12px; background: #f0f2f5; color: #1a2e4a; border: 1px solid #ddd; border-radius: 6px; font-size: 15px; text-decoration: none; text-align: center; margin-top: 8px;">Try Demo — No Account Needed</a>
  </div>
</body>
</html>
