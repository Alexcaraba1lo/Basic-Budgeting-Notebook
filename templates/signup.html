<!DOCTYPE html>
<html>
<head>
  <title>Sign Up - MyBudgetPlan</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/static/manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MyBudgetPlan">
  <link rel="apple-touch-icon" href="/static/icon-192.png">
  <meta name="theme-color" content="#1a2e4a">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
    body { background: #1a2e4a; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .card { background: white; border-radius: 16px; padding: 32px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); width: 100%; max-width: 400px; }
    h1 { text-align: center; color: #1a2e4a; margin-bottom: 8px; }
    .subtitle { text-align: center; color: #888; font-size: 14px; margin-bottom: 24px; }
    label { display: block; font-size: 13px; color: #555; margin-bottom: 6px; margin-top: 14px; }
    input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
    .password-wrapper { position: relative; }
    .password-wrapper input { padding-right: 42px; }
    .toggle-btn { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-size: 18px; padding: 4px; }
    button[type="submit"] { width: 100%; padding: 14px; background: #1a2e4a; color: white; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; margin-top: 20px; font-weight: bold; }
    button[type="submit"]:hover { background: #243d5f; }
    .error { background: #fee; color: #e74c3c; padding: 10px; border-radius: 6px; margin-bottom: 16px; font-size: 13px; text-align: center; }
    .footer-link { text-align: center; margin-top: 16px; font-size: 13px; color: #555; }
    .footer-link a { color: #1a2e4a; font-weight: bold; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <h1>MyBudgetPlan</h1>
    <p class="subtitle">Create your free account</p>
    
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    
    <form method="POST">
      <label>Name</label>
      <input type="text" name="name" placeholder="Your name" required>
      
      <label>Email</label>
      <input type="email" name="email" placeholder="you@email.com" required>
      
      <label>Password</label>
      <div class="password-wrapper">
        <input type="password" name="password" id="password" placeholder="Create a password (min 6 chars)" required minlength="6">
        <button type="button" class="toggle-btn" onclick="togglePassword('password', 'eye1')">
          <span id="eye1">👁</span>
        </button>
      </div>
      
      <label>Confirm Password</label>
      <div class="password-wrapper">
        <input type="password" name="confirm_password" id="confirm_password" placeholder="Type password again" required minlength="6">
        <button type="button" class="toggle-btn" onclick="togglePassword('confirm_password', 'eye2')">
          <span id="eye2">👁</span>
        </button>
      </div>
      
      <button type="submit">Create Account</button>
    </form>
    
    <div class="footer-link">
      Already have an account? <a href="/login">Sign in</a>
    </div>
  </div>

  <script>
    function togglePassword(fieldId, eyeId) {
      var field = document.getElementById(fieldId);
      var eye = document.getElementById(eyeId);
      if (field.type === 'password') {
        field.type = 'text';
        eye.textContent = '🙈';
      } else {
        field.type = 'password';
        eye.textContent = '👁';
      }
    }
  </script>
</body>
</html>
